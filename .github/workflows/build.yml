name: Sanaya APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/sanaya/assistant/service
        mkdir -p app/src/main/java/com/sanaya/assistant/receiver
        mkdir -p app/src/main/res/xml
        mv AccessibilityHelperService.kt app/src/main/java/com/sanaya/assistant/service/
        mv SanayaVoiceReceiver.kt app/src/main/java/com/sanaya/assistant/receiver/
        mv AndroidManifest.xml app/src/main/
        mv accessibility_service_config.xml app/src/main/res/xml/

    - name: Create Gradle Files
      run: |
        echo "include ':app'" > settings.gradle
        echo "buildscript { ext.kotlin_version = '1.8.0'; repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.0'; classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\" } }" > build.gradle
        echo "plugins { id 'com.android.application'; id 'kotlin-android' }; android { namespace 'com.sanaya.assistant'; compileSdk 33; defaultConfig { applicationId 'com.sanaya.assistant'; minSdk 24; targetSdk 33; versionCode 1; versionName '1.0' } }; dependencies { implementation 'androidx.core:core-ktx:1.10.1' }" > app/build.gradle

    - name: Build with Gradle
      run: chmod +x gradlew && ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sanaya-App-Download
        path: app/build/outputs/apk/debug/app-debug.apk
