name: Sanaya APK Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Get Code from Locker
      uses: actions/checkout@v4

    - name: Setup Java System
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Arrange Files for Android
      run: |
        mkdir -p app/src/main/java/com/sanaya/assistant/service
        mkdir -p app/src/main/java/com/sanaya/assistant/receiver
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values

        mv AccessibilityHelperService.kt app/src/main/java/com/sanaya/assistant/service/ || true
        mv SanayaVoiceReceiver.kt app/src/main/java/com/sanaya/assistant/receiver/ || true
        mv AndroidManifest.xml app/src/main/ || true
        mv accessibility_service_config.xml app/src/main/res/xml/ || true

        cat <<EOF > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Sanaya AI</string>
        </resources>
        EOF

        cat <<EOF > build.gradle
        buildscript {
            ext.kotlin_version = '1.8.0'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.2'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
            }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat <<EOF > settings.gradle
        include ':app'
        EOF

        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            namespace 'com.sanaya.assistant'
            compileSdk 33
            defaultConfig {
                applicationId "com.sanaya.assistant"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.10.1'
        }
        EOF

    - name: Build APK File
      run: gradle assembleDebug

    - name: Upload APK for Download
      uses: actions/upload-artifact@v4
      with:
        name: Sanaya-App-Download
        path: app/build/outputs/apk/debug/app-debug.apk
